# ── Server ──
server.port=8080
server.baseUrl=http://localhost:8080
server.body.maxSize=65536

# ── Pipeline (Phase 2+) ──
pipeline.sla.maxLatencyMs=50
pipeline.context.pool.size=256
postresponse.impression.workers=2
postresponse.impression.queueCapacity=65536
# Cheap pre-filter by value_per_click — caps scoring/sorting work per request.
# 3-min soak JFR showed scoring+sorting ALL ~278 matched candidates at 5K RPS produces
# unsustainable GC pressure (ZGC pauses to 73ms). Limiting to top 64 cuts scoring 4×
# and sorting 4×, drops allocation rate, keeps ZGC sub-ms. Top 64 by value_per_click
# captures the actual winner ~99% of the time, so bid quality is unchanged.
pipeline.candidates.max=32
# Score-ordered paged freq-cap: ask Redis about top scorers in batches; stop when we have
# keepTopAllowed allowed candidates. Avoids one giant MGET of all matched campaigns.
pipeline.frequencycap.batchSize=16
pipeline.frequencycap.keepTopAllowed=64
cache.user.segments.maxSize=500000
cache.user.segments.ttlSeconds=60

# ── Redis (Phase 3+) ──
redis.uri=redis://localhost:6379
redis.command.timeout.ms=50
redis.connect.timeout.ms=2000

# ── Frequency-cap store ──
# redis (default) | aerospike
# When aerospike: docker-compose --profile aerospike up -d
freqcap.store=redis

# ── Aerospike (only used when freqcap.store=aerospike) ──
aerospike.host=localhost
aerospike.port=3500
aerospike.namespace=rtb
aerospike.set=freq
aerospike.connect.timeout.ms=2000
aerospike.command.timeout.ms=50
aerospike.eventloop.size=4

# ── Campaigns ──
campaigns.source=json
# campaigns.source=postgres

# ── PostgreSQL (when campaigns.source=postgres) ──
postgres.host=localhost
postgres.port=5432
postgres.database=rtb
postgres.user=rtb
postgres.password=rtb

# ── ClickHouse (analytics — reads from Kafka via Kafka engine, no app config needed) ──
# Access via HTTP: http://localhost:8123
# Access via native: localhost:9000

# ── Targeting ──
targeting.type=segment
targeting.embedding.campaign.path=ml/campaign_embeddings.json
targeting.embedding.word.path=ml/word_embeddings.json
targeting.embedding.threshold=0.3

# ── Scoring ──
scoring.type=feature-weighted
scoring.ml.model.path=ml/pctr_model.onnx
scoring.ml.schema.path=ml/feature_schema.json
scoring.abtest.treatment.percentage=50
scoring.cascade.threshold=0.1

# ── Budget Pacing ──
pacing.type=local
pacing.hourly.enabled=false
pacing.hourly.hours=24

# Quality-based throttling — skip/reduce spend on low-pCTR requests (Phase 15)
# score < low  → never spend (save for high-quality requests)
# score >= high → always spend
# in between   → probabilistic, linearly interpolated
pacing.quality.throttling.enabled=false
pacing.quality.threshold.low=0.05
pacing.quality.threshold.high=0.20

# ── Resilience ──
resilience.redis.failure.threshold=5
resilience.redis.cooldown.ms=10000
resilience.kafka.failure.threshold=5
resilience.kafka.cooldown.ms=30000

# ── Events ──
events.type=noop

# ── Kafka (when events.type=kafka) ──
kafka.bootstrap.servers=localhost:9092
kafka.topic.bid-events=bid-events
kafka.topic.win-events=win-events
kafka.topic.impression-events=impression-events
kafka.topic.click-events=click-events

# ── Logging ──
logging.level=INFO
