# ── Server ──
server.port=8080
server.baseUrl=http://localhost:8080
server.body.maxSize=65536

# ── Pipeline (Phase 2+) ──
pipeline.sla.maxLatencyMs=50
pipeline.context.pool.size=256

# ── Redis (Phase 3+) ──
redis.uri=redis://localhost:6379
redis.command.timeout.ms=50
redis.connect.timeout.ms=2000

# ── Campaigns ──
campaigns.source=json
# campaigns.source=postgres

# ── PostgreSQL (when campaigns.source=postgres) ──
postgres.host=localhost
postgres.port=5432
postgres.database=rtb
postgres.user=rtb
postgres.password=rtb

# ── ClickHouse (analytics — reads from Kafka via Kafka engine, no app config needed) ──
# Access via HTTP: http://localhost:8123
# Access via native: localhost:9000

# ── Targeting ──
targeting.type=segment
targeting.embedding.campaign.path=ml/campaign_embeddings.json
targeting.embedding.word.path=ml/word_embeddings.json
targeting.embedding.threshold=0.3

# ── Scoring ──
scoring.type=feature-weighted
scoring.ml.model.path=ml/pctr_model.onnx
scoring.ml.schema.path=ml/feature_schema.json
scoring.abtest.treatment.percentage=50
scoring.cascade.threshold=0.1

# ── Budget Pacing ──
pacing.type=local
pacing.hourly.enabled=false
pacing.hourly.hours=24

# ── Resilience ──
resilience.redis.failure.threshold=5
resilience.redis.cooldown.ms=10000
resilience.kafka.failure.threshold=5
resilience.kafka.cooldown.ms=30000

# ── Events ──
events.type=noop

# ── Kafka (when events.type=kafka) ──
kafka.bootstrap.servers=localhost:9092
kafka.topic.bid-events=bid-events
kafka.topic.win-events=win-events
kafka.topic.impression-events=impression-events
kafka.topic.click-events=click-events

# ── Logging ──
logging.level=INFO
