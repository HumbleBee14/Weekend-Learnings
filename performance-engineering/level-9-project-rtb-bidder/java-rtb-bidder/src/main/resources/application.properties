# ── Server ──
server.port=8080
server.body.maxSize=65536

# ── Pipeline (Phase 2+) ──
pipeline.sla.maxLatencyMs=50

# ── Redis (Phase 3+) ──
redis.uri=redis://localhost:6379
redis.timeout.ms=5

# ── Kafka (Phase 8+) ──
kafka.bootstrap.servers=localhost:9092
kafka.topic.bid-events=bid-events
kafka.topic.win-events=win-events
kafka.topic.impression-events=impression-events
kafka.topic.click-events=click-events

# ── Logging ──
logging.level=INFO
