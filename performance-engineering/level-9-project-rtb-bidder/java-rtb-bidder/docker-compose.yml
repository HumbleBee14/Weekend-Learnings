services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Exposes Redis server-side metrics (memory, clients, per-command latency,
  # evictions, keyspace hits/misses) for Prometheus on port 9121.
  # Without this, bidder-side latency is the only Redis signal — we can't tell
  # "Redis is slow" from "the stage code around Redis is slow".
  redis-exporter:
    # v1.82.0-alpine is the first stable line with native linux/arm64 manifests —
    # earlier tags (v1.62.x) were amd64-only and ran under Rosetta on Apple Silicon.
    image: oliver006/redis_exporter:v1.82.0-alpine
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    restart: unless-stopped
    depends_on:
      - redis

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Exposes Kafka broker-level metrics (topic lag, partition throughput,
  # consumer group lag, broker-level offset gaps) for Prometheus on :9308.
  # Kafka clients emit their own metrics (see KafkaClientMetrics binder on
  # the bidder); this exporter gives the SERVER-side view so we can see
  # when brokers themselves are slow/backlogged.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "9308:9308"
    # Kafka takes a few seconds to open its broker listener; depends_on only
    # waits for the container to start, not for Kafka to be ready.
    # restart:unless-stopped gives the exporter retry-until-success behaviour.
    restart: unless-stopped
    depends_on:
      - kafka

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rtb
      POSTGRES_USER: rtb
      POSTGRES_PASSWORD: rtb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql

  # PostgreSQL server metrics (query rate, connections, locks, cache hit ratio,
  # replication lag). Only relevant when CAMPAIGNS_SOURCE=postgres, but always
  # running so panels populate immediately on switchover.
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://rtb:rtb@postgres:5432/rtb?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped
    depends_on:
      - postgres

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"     # HTTP interface (queries, inserts)
      - "9000:9000"     # Native protocol
    environment:
      CLICKHOUSE_DB: rtb
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./docker/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
    depends_on:
      - kafka
    # Suppresses harmless "get_mempolicy: Operation not permitted" on macOS Docker.
    # ClickHouse probes NUMA memory policies which the macOS hypervisor does not expose.
    # unconfined seccomp allows all syscalls — acceptable for local dev, not for prod.
    security_opt:
      - seccomp:unconfined

  # cAdvisor — per-container CPU / memory / network / disk IO for ALL
  # containers in this compose (redis, kafka, postgres, clickhouse, prometheus,
  # grafana, and the exporters). Fills the gap between "bidder JVM metrics"
  # and "host metrics" — we see exactly what each dependency is consuming.
  #
  # ⚠ LOCAL DEV ONLY. This service runs with privileged: true and read-only
  #   mounts of the host root, /sys, and the Docker socket. That is standard
  #   for cAdvisor but is a high-privilege surface. Do NOT copy this config
  #   to production compose files — use a restricted host-metrics collector
  #   (node-exporter + a kubelet-integrated cAdvisor if on k8s) instead.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      # Defaults are dev-only. Override via env vars or .env file:
      #   GRAFANA_ADMIN_USER=myuser GRAFANA_ADMIN_PASSWORD=mypass docker compose up
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/rtb-bidder.json
      # Image Renderer — enables "Export as PNG" on any panel and whole-dashboard PNG via API
      GF_RENDERING_SERVER_URL: http://grafana-renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_LOG_FILTERS: rendering:debug
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - grafana-renderer

  # Headless Chrome renderer — lets Grafana export panels and dashboards as PNG.
  # Used by: panel share menu → "Export as PNG", and the /render HTTP API.
  grafana-renderer:
    image: grafana/grafana-image-renderer:latest
    ports:
      - "8082:8081"
    environment:
      ENABLE_METRICS: "true"

  # ── Aerospike — alternative frequency-cap store ───────────────────────────
  # Only starts when explicitly enabled. Run with:
  #   docker-compose --profile aerospike up -d
  # The bidder must be started with FREQCAP_STORE=aerospike to use this service.
  aerospike:
    image: aerospike/aerospike-server:latest
    profiles: ["aerospike"]
    ports:
      - "3500:3000"     # client (binary) protocol — host 3500 to avoid clashing with Grafana's 3000
      - "3501:3001"     # fabric (cluster comms — single-node here, harmless)
      - "3502:3002"     # heartbeat
      - "3503:3003"     # info
    environment:
      NAMESPACE: rtb
      MEM_GB: "1"
      DEFAULT_TTL: "3600"
    volumes:
      - aerospike-data:/opt/aerospike/data

volumes:
  redis-data:
  kafka-data:
  postgres-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:
  aerospike-data:
