global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'rtb-bidder'
    metrics_path: '/metrics'
    # host.docker.internal resolves to the host machine from inside Docker
    # This is where the bidder runs (not inside Docker)
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          instance: 'bidder-1'
